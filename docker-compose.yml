version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend-api:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - redis

  backend-worker:
    build:
      context: ./backend
    command: python -m arq app.worker.WorkerSettings
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://backend-api:8000
      NEXT_PUBLIC_WS_BASE_URL: ws://backend-api:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend-api
